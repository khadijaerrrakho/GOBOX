<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>
<link rel="stylesheet" href="style.css">

<style>

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a001f, #2a0033);
    margin: 0;
    padding: 20px;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #d59cff;
}

/* CARD */

.cart-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1f1f1f;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.cart-item:hover {
    transform: scale(1.02);
}

/* IMAGE */

.cart-item img {
    width: 80px;
    border-radius: 10px;
}

/* INFO */

.item-info {
    flex: 1;
    margin-left: 15px;
}

.item-info h3 {
    margin: 0;
    color: #ffffff;
}

.item-info p {
    color: #b46cff;
    font-weight: bold;
}

/* QUANTITY */

.quantity {
    display: flex;
    align-items: center;
    margin-top: 10px;
}

.quantity button {
    padding: 6px 12px;
    border: none;
    background: #6a0dad;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

.quantity button:hover {
    background: #8a2be2;
}

.quantity span {
    margin: 0 10px;
}

/* REMOVE */

.remove-btn {
    background: red;
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 6px;
}

/* TOTAL */

.total-box {
    background: #1f1f1f;
    padding: 20px;
    border-radius: 12px;
    text-align: right;
    margin-top: 20px;
    border: 1px solid #6a0dad;
}

.total-box h2 {
    color: #d59cff;
}

/* WHATSAPP */

.whatsapp-btn {
    width: 100%;
    padding: 15px;
    background: #25D366;
    color: white;
    border: none;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

.whatsapp-btn:hover {
    background: #1ebe5d;
}

</style>

</head>

<body>

<div class="container">

<h1>🛒 My Cart</h1>

<div id="cart-items"></div>

<div class="total-box">
    <h2>Total: <span id="total">0 DH</span></h2>
</div>

<button class="whatsapp-btn" onclick="openPopup()">
    Commander via WhatsApp
</button>

</div>
<!-- POPUP ORDER -->
<div id="orderPopup" class="popup">

<div class="popup-content">

<h2>Complete your order</h2>

<input type="text" id="clientName" placeholder="Your name">
<input type="text" id="clientPhone" placeholder="Your phone">
<input type="text" id="clientAddress" placeholder="Your address">
<input type="text" id="clientAddress2" placeholder="Home address (street / house)">
<div id="popup-products"></div>

<h3>Total: <span id="popup-total"></span></h3>

<button onclick="sendOrder()">Confirm via WhatsApp</button>
<button onclick="closePopup()">Cancel</button>

</div>
</div>
<script src="cart.js"></script>

</body>
</html>
