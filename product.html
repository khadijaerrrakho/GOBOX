<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details</title>
<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h2 class="logo">GOBOX</h2>

</header>


<button onclick="goBack()">⬅ Back</button>



<section class="product-details">


<img src="images/device1.jpeg" class="detail-img">


<div class="info">

<h1>Aroma Diffuser</h1>

<p class="price">120$</p>


<p>

High quality aroma diffuser.
Perfect for essential oils and relaxation.

</p>


<button onclick="addToCart()">Add to cart</button>


</div>


</section>


<script>

function addToCart(){

let cart = localStorage.getItem("cart") || 0;

cart++;

localStorage.setItem("cart", cart);

alert("Product added to cart");

}

function goBack(){

window.close();

}

</script>


</body>

</html>
